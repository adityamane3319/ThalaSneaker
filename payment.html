<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala7-Payment</title>
    <link rel="stylesheet" href="css/payment.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <div class="logo">
                    <h1><span>Thala</span>7.</h1>
                </div>
                <ul class="nav-links">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#brand">Brand</a></li>
                    <li><a href="#more">More</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>

                <div class="nav-right">
                    <div class="search">
                        <input type="text" id="search" name="name" placeholder="🔍 Search">
                    </div>
                    <div class="cart">
                        <input type="number" id="cart" name="cart" placeholder="🛒0">
                        <div class="img">
                            <img src="https://cdn-icons-png.flaticon.com/128/3135/3135715.png" alt="profile">
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="container-pay">
                <div class="left">
                    <p class="subheading">Checkout</p>
                    <h3>Contact Details</h3>
                    <label>Email ID</label>
                    <input type="text" placeholder="John Doe" class="input">

                    <h3>Payment</h3>

                    <div class="payment-box">
                        <div class="payment-options">

                            <input type="radio" name="payment" id="card" checked>
                            <label for="card">Card</label>

                            <input type="radio" name="payment" id="crypto">
                            <label for="crypto">Crypto</label>

                            <input type="radio" name="payment" id="bank">
                            <label for="bank">Bank</label>

                            <input type="radio" name="payment" id="more">
                            <label for="more">⋮</label>

                        </div>

                        <label>Card Number</label>
                        <input type="text" placeholder="Ex:- 1234 5678 9012 3456" class="input">

                        <div class="row">
                            <div class="col">
                                <label>Expiry</label>
                                <input type="text" placeholder="MM/YY" class="input">
                            </div>

                            <div class="col">
                                <label>CVC</label>
                                <input type="text" placeholder="•••" class="input">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <label>Country</label>
                                <select class="input">
                                    <option>India</option>
                                    <option>America</option>
                                    <option>Austrelia</option>
                                    <option>New Zealand</option>
                                    <option>England</option>
                                </select>
                            </div>

                            <div class="col">
                                <label>ZIP</label>
                                <input type="text" placeholder="000000" class="input">
                            </div>
                        </div>
                    </div>
                </div>


                <div class="right">

                    <h2>Order Summary</h2>

                    <div class="card">

                        <div class="coupon">
                            <input type="text" placeholder="COUPON CODE">
                            <button>Apply Coupon</button>
                        </div>

                        <div class="summary">
                            <div class="row">
                                <span>Sub Total</span>
                                <span>₹4,700</span>
                            </div>

                            <div class="row">
                                <span>Taxes (if applicable)</span>
                                <span>₹199</span>
                            </div>

                            <div class="row">
                                <span>Discount</span>
                                <span>₹0</span>
                            </div>

                            <div class="row total">
                                <span>Total</span>
                                <span>₹4,999</span>
                            </div>
                        </div>

                    </div>

                    <button class="pay-btn" type="button">Pay Now ₹4,999</button>

                    <div class="payments">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Razorpay_logo.svg" alt="img">
                    </div>

                </div>

            </div>
        </section>
    </main>
</body>

</html>
